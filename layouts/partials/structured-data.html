{{ if or .IsHome (eq .RelPermalink "/about/") (eq .RelPermalink "/contact/") }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "LegalService",
  "@id": "https://litigra.com/#legalservice",
  "name": "Litigra",
  "alternateName": "Litigra Law Firm",
  "description": "Chandigarh-based law firm founded in 2016, appearing before the Supreme Court of India, the High Courts of Punjab and Haryana, Himachal Pradesh, and Delhi, the NCLT at Chandigarh and New Delhi, the NCLAT, and civil courts across Punjab and Haryana.",
  "url": "https://litigra.com",
  "email": "{{ .Site.Params.email }}",
  "telephone": "{{ .Site.Params.phone }}",
  "foundingDate": "2016",
  "priceRange": "$$$",
  "image": "https://litigra.com/images/og-default.png",
  "logo": "https://litigra.com/images/og-default.png",
  "address": [
    {
      "@type": "PostalAddress",
      "streetAddress": "{{ .Site.Params.address_chamber }}",
      "addressLocality": "Chandigarh",
      "addressRegion": "Chandigarh",
      "addressCountry": "IN"
    },
    {
      "@type": "PostalAddress",
      "streetAddress": "{{ .Site.Params.address_chandigarh }}",
      "addressLocality": "Chandigarh",
      "addressRegion": "Chandigarh",
      "addressCountry": "IN"
    },
    {
      "@type": "PostalAddress",
      "streetAddress": "{{ .Site.Params.address_mohali }}",
      "addressLocality": "Mohali",
      "addressRegion": "Punjab",
      "addressCountry": "IN"
    }
  ],
  "openingHoursSpecification": [{
    "@type": "OpeningHoursSpecification",
    "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
    "opens": "10:00",
    "closes": "19:00"
  }],
  "areaServed": [
    { "@type": "City", "name": "Chandigarh" },
    { "@type": "City", "name": "Mohali" },
    { "@type": "City", "name": "Panchkula" },
    { "@type": "City", "name": "New Delhi" },
    { "@type": "AdministrativeArea", "name": "Punjab" },
    { "@type": "AdministrativeArea", "name": "Haryana" },
    { "@type": "AdministrativeArea", "name": "Himachal Pradesh" },
    { "@type": "AdministrativeArea", "name": "Delhi NCR" }
  ],
  "availableLanguage": ["English", "Hindi", "Punjabi"],
  "knowsAbout": [
    "Civil and Commercial Litigation",
    "Corporate Litigation",
    "Insolvency and Bankruptcy",
    "Constitutional and Writ Practice",
    "Criminal Defence",
    "White Collar Crime",
    "Commercial Arbitration",
    "Service and Labour Law",
    "Banking and Recovery",
    "SARFAESI",
    "Indirect Tax",
    "Appellate Practice",
    "Supreme Court of India Practice",
    "Punjab and Haryana High Court Practice",
    "Himachal Pradesh High Court Practice",
    "Delhi High Court Practice",
    "NCLT Practice",
    "NCLAT Practice"
  ]
}
</script>
{{ end }}

{{ if eq .Type "blog" }}
{{ if not .IsSection }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ .Title }}",
  "description": "{{ .Params.abstract | default .Description }}",
  "datePublished": "{{ .PublishDate.Format "2006-01-02T15:04:05Z07:00" }}",
  {{ if .Params.lastmod }}"dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",{{ end }}
  "author": {
    "@type": "Person",
    "name": "{{ .Params.author | default "Litigra" }}"
  },
  "publisher": {
    "@type": "Organization",
    "name": "Litigra",
    "url": "https://litigra.com"
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  }{{ if .Params.tags }},
  "keywords": "{{ delimit .Params.tags ", " }}"{{ end }}
}
</script>
{{ end }}
{{ end }}

{{ if eq .Type "people" }}
{{ if not .IsSection }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "{{ .Title }}",
  {{ with .Params.designation }}"jobTitle": "{{ . }}",{{ end }}
  "worksFor": {
    "@type": "LegalService",
    "name": "Litigra",
    "url": "https://litigra.com"
  }{{ if .Params.education }},
  "alumniOf": [
    {{ range $i, $e := .Params.education }}{{ if $i }},{{ end }}
    {
      "@type": "EducationalOrganization",
      "name": "{{ . }}"
    }
    {{ end }}
  ]{{ end }}
}
</script>
{{ end }}
{{ end }}

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "https://litigra.com/"
    }{{ if not .IsHome }},
    {{ if eq .Type "blog" }}{{ if not .IsSection }}{
      "@type": "ListItem",
      "position": 2,
      "name": "Writing",
      "item": "https://litigra.com/blog/"
    },
    {{ if .Params.categories }}{{ with index .Params.categories 0 }}{
      "@type": "ListItem",
      "position": 3,
      "name": "{{ . }}",
      "item": "https://litigra.com/categories/{{ . | urlize }}/"
    },
    {{ end }}{{ end }}{
      "@type": "ListItem",
      "position": {{ if .Params.categories }}4{{ else }}3{{ end }},
      "name": "{{ .Title }}",
      "item": "{{ .Permalink }}"
    }
    {{ else }}{
      "@type": "ListItem",
      "position": 2,
      "name": "{{ .Title }}",
      "item": "{{ .Permalink }}"
    }{{ end }}
    {{ else }}{{ if eq .Type "people" }}{{ if not .IsSection }}{
      "@type": "ListItem",
      "position": 2,
      "name": "People",
      "item": "https://litigra.com/people/"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": "{{ .Title }}",
      "item": "{{ .Permalink }}"
    }
    {{ else }}{
      "@type": "ListItem",
      "position": 2,
      "name": "{{ .Title }}",
      "item": "{{ .Permalink }}"
    }{{ end }}
    {{ else }}{
      "@type": "ListItem",
      "position": 2,
      "name": "{{ .Title }}",
      "item": "{{ .Permalink }}"
    }{{ end }}{{ end }}{{ end }}
  ]
}
</script>
