baseURL = "https://litigra.com/"
relativeURLs = true
languageCode = "en-us"
title = "Litigra"
[pagination]
  pagerSize = 8

[params]
  description = "Litigation and advisory practice, Chandigarh."
  email = "office@litigra.com"
  phone = "+91 98721 70870"
  address_chamber = "Lawyers' Chamber No. 2, Above SBI, Punjab & Haryana High Court, Chandigarh"
  address_chandigarh = "#62, Sector 2, Chandigarh"
  address_mohali = "#1608, Sector 60, Mohali"

[menus]
  [[menus.main]]
    name = "The Firm"
    url = "/about/"
    weight = 1
  [[menus.main]]
    name = "Practice"
    url = "/practice-areas/"
    weight = 2
  [[menus.main]]
    name = "People"
    url = "/team/"
    weight = 3
  [[menus.main]]
    name = "Writing"
    url = "/blog/"
    weight = 4
  [[menus.main]]
    name = "Careers"
    url = "/careers/"
    weight = 5
  [[menus.main]]
    name = "Contact"
    url = "/contact/"
    weight = 6

[sitemap]
  changefreq = "monthly"
  priority = 0.5

[outputs]
  home = ["HTML", "RSS", "SearchIndex"]
  section = ["HTML", "RSS"]

[outputFormats.SearchIndex]
  mediaType = "application/json"
  baseName = "search-index"
  isPlainText = true
  notAlternative = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[taxonomies]
  category = "categories"
  tag = "tags"
