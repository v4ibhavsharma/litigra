backend:
  name: github
  repo: v4ibhavsharma/litigra
  branch: main
  base_url: https://litigra-oauth.vaibhav-bb7.workers.dev
  site_domain: litigra.com
  auth_endpoint: /auth

media_folder: static/images/uploads
public_folder: /images/uploads

collections:
  - name: "blog"
    label: "Writing"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Author", name: "author", widget: "string", default: "Vaibhav Sharma" }
      - { label: "Category", name: "categories", widget: "select", options: ["Criminal", "Civil", "Constitutional", "Criminal Tax", "Insolvency", "Company"], default: ["Civil"], multiple: true }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Abstract", name: "abstract", widget: "text", required: false, hint: "A 2-3 line summary for the hero banner and listing cards." }
      - { label: "Judgment PDF", name: "judgment_pdf", widget: "file", required: false, hint: "Upload the judgment or order PDF." }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }
