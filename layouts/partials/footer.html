<footer>
    <div class="footer-content">
        <div class="container">
            <!-- Top section: two columns -->
            <div class="footer-top">
                <div class="footer-left">
                    <div class="logo-text">LITIGRA</div>
                    <p class="footer-copyright">&copy; {{ now.Year }} Litigra. All rights reserved.</p>
                </div>
                <div class="footer-right">
                    <nav class="footer-nav">
                        {{ if .Site.Menus.main }}
                            {{ range .Site.Menus.main }}
                                <a href="{{ .URL }}" class="footer-link">{{ .Name }}</a>
                            {{ end }}
                        {{ end }}
                    </nav>
                </div>
            </div>

            <!-- Bottom section: email and phone only -->
            <div class="footer-bottom">
                <p class="footer-contact">
                    {{ with .Site.Params.email }}<a href="mailto:{{ . }}">{{ . }}</a>{{ end }}
                    {{ if and .Site.Params.email .Site.Params.phone }} · {{ end }}
                    {{ with .Site.Params.phone }}{{ . }}{{ end }}
                </p>
            </div>
        </div>
    </div>
</footer>
